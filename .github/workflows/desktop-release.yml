name: Build desktop release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop-release:
    name: Build NSIS installer
    runs-on: windows-2025

    env:
      PROJECT_PATH: desktop/ChamSD.Desktop/ChamSD.Desktop.csproj
      TEST_PROJECT_PATH: desktop/ChamSD.Tests/ChamSD.Tests.csproj
      APP_NAME: ChamSD.Desktop
      PUBLISH_DIR: ${{ github.workspace }}\artifacts\publish\ChamSD.Desktop
      RELEASE_DIR: ${{ github.workspace }}\artifacts\release
      VERSION: 0.0.${{ github.run_number }}
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Node dependencies
        shell: pwsh
        run: npm ci

      - name: Install Playwright browser
        shell: pwsh
        run: npx playwright install chromium

      - name: Test website strategy engine
        shell: pwsh
        run: npm test

      - name: Test website visual layout
        shell: pwsh
        run: npm run test:visual

      - name: Test desktop strategy engine
        shell: pwsh
        run: dotnet run --project $env:TEST_PROJECT_PATH -c Release

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          $nsisBinPath = Join-Path $nsisPath "Bin"
          Add-Content $env:GITHUB_PATH $nsisPath
          Add-Content $env:GITHUB_PATH $nsisBinPath

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:PROJECT_PATH -r win-x64

      - name: Publish desktop app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:PUBLISH_DIR | Out-Null
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -p:Platform=x64 `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishDir="$env:PUBLISH_DIR\"

      - name: Build NSIS installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:RELEASE_DIR | Out-Null
          $makensis = (Get-Command makensis -ErrorAction SilentlyContinue)?.Source
          if (-not $makensis) {
            $candidates = @(
              "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
              "${env:ProgramFiles(x86)}\NSIS\Bin\makensis.exe",
              "${env:ProgramFiles}\NSIS\makensis.exe",
              "${env:ProgramFiles}\NSIS\Bin\makensis.exe"
            )
            $makensis = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $makensis) {
            throw "makensis.exe was not found after NSIS install."
          }
          & $makensis `
            /DVERSION=$env:VERSION `
            /DPUBLISH_DIR="$env:PUBLISH_DIR" `
            /DOUT_FILE="$env:RELEASE_DIR\ChamSD.Desktop.Setup.exe" `
            installer\ChamSD.Desktop.nsi

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $safeRef = "${{ github.ref_name }}" -replace '[^A-Za-z0-9._-]', '-'
          $tag = "desktop-$safeRef-${{ github.run_number }}-${{ github.run_attempt }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $tag $env:GITHUB_SHA
          git push origin $tag
          gh release create $tag `
            "$env:RELEASE_DIR\ChamSD.Desktop.Setup.exe" `
            --target $env:GITHUB_SHA `
            --title "ChamSD Desktop $tag" `
            --notes "Automated ChamSD Desktop release from ${{ github.ref_name }} at $env:GITHUB_SHA. Includes the NSIS installer uploaded directly to this GitHub Release."
